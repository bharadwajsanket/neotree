name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ------------------------------------------------------------------ #
  #  Linux                                                               #
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-linux-x86_64

      - name: Install arm64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build arm64
        run: |
          aarch64-linux-gnu-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-linux-arm64

      - name: Install armv7 cross compiler
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build armv7
        run: |
          arm-linux-gnueabihf-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-linux-armv7

      - name: Package Linux assets
        run: |
          mkdir -p build-x86_64
          cp neotree-linux-x86_64 build-x86_64/neotree
          cp man/neotree.1 build-x86_64/neotree.1
          tar -czf neotree-${{ github.ref_name }}-linux-x86_64.tar.gz -C build-x86_64 neotree neotree.1

          mkdir -p build-arm64
          cp neotree-linux-arm64 build-arm64/neotree
          cp man/neotree.1 build-arm64/neotree.1
          tar -czf neotree-${{ github.ref_name }}-linux-arm64.tar.gz -C build-arm64 neotree neotree.1

          mkdir -p build-armv7
          cp neotree-linux-armv7 build-armv7/neotree
          cp man/neotree.1 build-armv7/neotree.1
          tar -czf neotree-${{ github.ref_name }}-linux-armv7.tar.gz -C build-armv7 neotree neotree.1

      - name: Upload x86_64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-x86_64
          path: neotree-${{ github.ref_name }}-linux-x86_64.tar.gz

      - name: Upload arm64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-arm64
          path: neotree-${{ github.ref_name }}-linux-arm64.tar.gz

      - name: Upload armv7 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-armv7
          path: neotree-${{ github.ref_name }}-linux-armv7.tar.gz

  # ------------------------------------------------------------------ #
  #  macOS                                                               #
  # ------------------------------------------------------------------ #
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          clang -target x86_64-apple-macos10.12 -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-macos-x86_64

      - name: Build arm64
        run: |
          clang -target arm64-apple-macos11 -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-macos-arm64

      - name: Package macOS assets
        run: |
          mkdir -p build-x86_64
          cp neotree-macos-x86_64 build-x86_64/neotree
          cp man/neotree.1 build-x86_64/neotree.1
          tar -czf neotree-${{ github.ref_name }}-macos-x86_64.tar.gz -C build-x86_64 neotree neotree.1

          mkdir -p build-arm64
          cp neotree-macos-arm64 build-arm64/neotree
          cp man/neotree.1 build-arm64/neotree.1
          tar -czf neotree-${{ github.ref_name }}-macos-arm64.tar.gz -C build-arm64 neotree neotree.1

      - name: Upload x86_64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-macos-x86_64
          path: neotree-${{ github.ref_name }}-macos-x86_64.tar.gz

      - name: Upload arm64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-macos-arm64
          path: neotree-${{ github.ref_name }}-macos-arm64.tar.gz

  # ------------------------------------------------------------------ #
  #  Windows (Native compiler AMD64 / ARM64 via MSVC)                  #
  # ------------------------------------------------------------------ #
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Build Windows x64
        run: |
          cl.exe /std:c11 /O2 main.c tree.c fs.c cli.c utils.c find.c largest.c /Fe:neotree-windows-x64.exe

      - name: Set up MSVC arm64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64

      - name: Build Windows arm64
        run: |
          cl.exe /std:c11 /O2 main.c tree.c fs.c cli.c utils.c find.c largest.c /Fe:neotree-windows-arm64.exe

      - name: Package Windows assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build-x64 -Force
          Copy-Item neotree-windows-x64.exe build-x64/neotree.exe
          Compress-Archive -Path build-x64/* -DestinationPath neotree-${{ github.ref_name }}-windows-x64.zip

          New-Item -ItemType Directory -Path build-arm64 -Force
          Copy-Item neotree-windows-arm64.exe build-arm64/neotree.exe
          Compress-Archive -Path build-arm64/* -DestinationPath neotree-${{ github.ref_name }}-windows-arm64.zip

      - name: Upload x64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-windows-x64
          path: neotree-${{ github.ref_name }}-windows-x64.zip

      - name: Upload arm64 archive
        uses: actions/upload-artifact@v4
        with:
          name: neotree-windows-arm64
          path: neotree-${{ github.ref_name }}-windows-arm64.zip

  # ------------------------------------------------------------------ #
  #  Create GitHub Release and attach all archives                       #
  # ------------------------------------------------------------------ #
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: neotree ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
