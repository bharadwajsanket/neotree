name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ------------------------------------------------------------------ #
  #  Linux                                                               #
  # ------------------------------------------------------------------ #
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-linux-x86_64

      - name: Install arm64 cross compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build arm64
        run: |
          aarch64-linux-gnu-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-linux-arm64

      - name: Install armv7 cross compiler
        run: sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build armv7
        run: |
          arm-linux-gnueabihf-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-linux-armv7

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-x86_64
          path: neotree-linux-x86_64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-arm64
          path: neotree-linux-arm64

      - name: Upload armv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-linux-armv7
          path: neotree-linux-armv7

  # ------------------------------------------------------------------ #
  #  macOS                                                               #
  # ------------------------------------------------------------------ #
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          clang -target x86_64-apple-macos10.12 -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-macos-x86_64

      - name: Build arm64
        run: |
          clang -target arm64-apple-macos11 -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-macos-arm64

      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-macos-x86_64
          path: neotree-macos-x86_64

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-macos-arm64
          path: neotree-macos-arm64

  # ------------------------------------------------------------------ #
  #  Windows (cross-compiled via MinGW on Ubuntu)                        #
  # ------------------------------------------------------------------ #
  build-windows:
    name: Build (Windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: |
          x86_64-w64-mingw32-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c \
              -o neotree-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neotree-windows.exe
          path: neotree-windows.exe

  # ------------------------------------------------------------------ #
  #  Create GitHub Release and attach all binaries                       #
  # ------------------------------------------------------------------ #
  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: neotree ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/neotree-linux-x86_64/neotree-linux-x86_64
            dist/neotree-linux-arm64/neotree-linux-arm64
            dist/neotree-linux-armv7/neotree-linux-armv7
            dist/neotree-macos-x86_64/neotree-macos-x86_64
            dist/neotree-macos-arm64/neotree-macos-arm64
            dist/neotree-windows.exe/neotree-windows.exe
