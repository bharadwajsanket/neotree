name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  #  Linux                                                               #
  # ------------------------------------------------------------------ #
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: bash test.sh

  # ------------------------------------------------------------------ #
  #  macOS                                                               #
  # ------------------------------------------------------------------ #
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: bash test.sh

  # ------------------------------------------------------------------ #
  #  Windows — cross-compile only (no test runner; smoke test via wine) #
  # ------------------------------------------------------------------ #
  build-windows:
    name: Build (Windows cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: |
          x86_64-w64-mingw32-gcc -std=c99 -Wall -Wextra -Wpedantic -O2 \
              main.c tree.c fs.c cli.c utils.c find.c largest.c \
              -o neotree-windows.exe
